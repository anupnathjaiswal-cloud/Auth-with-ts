services:
  postgresdb:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres.env.POSTGRES_USER
      POSTGRES_PASSWORD: postgres.env.POSTGRES_PASSWORD
      POSTGRES_DB: postgres.env.POSTGRES_DB

    volumes:
      - "postgres-data:/var/lib/postgresql/data"

volumes:
  postgres-data:
